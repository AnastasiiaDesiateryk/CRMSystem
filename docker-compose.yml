version: '3.8'
services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-crm}
      POSTGRES_USER: ${POSTGRES_USER:-crm}
      POSTGRES_PASSWORD_FILE: /run/secrets/db_password
    ports:
      - "5432:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-crm} -d ${POSTGRES_DB:-crm}"]
      interval: 5s
      timeout: 3s
      retries: 20
    secrets:
      - db_password

  app:
    image: crm-backend
    build: .
    volumes:
      - ./secrets/jwt:/keys:ro
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/${POSTGRES_DB:-crm}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-crm}
      SPRING_CONFIG_IMPORT: optional:configtree:/run/secrets/

      JWT_KEYS_PATH: /keys
      JWT_ISSUER: ${JWT_ISSUER}
      JWT_AUDIENCE: ${JWT_AUDIENCE:-crm-frontend}

      BOOTSTRAP_ADMIN_EMAIL: ${BOOTSTRAP_ADMIN_EMAIL}
      BOOTSTRAP_ADMIN_NAME: ${BOOTSTRAP_ADMIN_NAME:-Admin}

      SPRING_SERVLET_MULTIPART_MAX_FILE_SIZE: 20MB
      SPRING_SERVLET_MULTIPART_MAX_REQUEST_SIZE: 20MB
      SERVER_TOMCAT_MAX_SWALLOW_SIZE: -1
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    secrets:
      - db_password
      - bootstrap_admin_password

secrets:
  db_password:
    file: ./secrets/db_password.txt
  bootstrap_admin_password:
    file: ./secrets/bootstrap_admin_password.txt

volumes:
  db-data: