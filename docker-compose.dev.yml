services:
  app:
    environment:
      SPRING_PROFILES_ACTIVE: dev
      JWT_ISSUER: http://localhost:8080

  web:
    image: crm-frontend
    build:
      context: ../CRMSystemFrontend
      dockerfile: Dockerfile
    environment:
      VITE_API_URL: http://localhost:8080
    ports:
      - "5173:5173"
    depends_on:
      app:
        condition: service_started