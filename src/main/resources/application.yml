spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/crm}
    username: ${SPRING_DATASOURCE_USERNAME:crm}
    password: ${db_password:${SPRING_DATASOURCE_PASSWORD:crm_pass}}
    driver-class-name: org.postgresql.Driver

    hikari:
      maximum-pool-size: ${DB_POOL_MAX:30}
      minimum-idle: ${DB_POOL_MIN_IDLE:8}
      connection-timeout: ${DB_CONNECTION_TIMEOUT_MS:3000}
      idle-timeout: ${DB_IDLE_TIMEOUT_MS:600000}
      max-lifetime: ${DB_MAX_LIFETIME_MS:1800000}
      leak-detection-threshold: ${DB_LEAK_DETECTION_MS:10000}

    servlet:
      multipart:
        max-file-size: ${SPRING_SERVLET_MULTIPART_MAX_FILE_SIZE:20MB}
        max-request-size: ${SPRING_SERVLET_MULTIPART_MAX_REQUEST_SIZE:20MB}

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: none
  flyway:
    enabled: true
    locations:
      - classpath:db/migration

server:
  port: 8080

jwt:
  issuer: ${JWT_ISSUER:http://localhost:8080}
  audience: ${JWT_AUDIENCE:crm-frontend}
  keys:
    path: ${JWT_KEYS_PATH:keys}

management:
  endpoints:
    web:
      exposure:
        include: health,info,mappings

BOOTSTRAP_ADMIN_PASSWORD: ${bootstrap_admin_password:}