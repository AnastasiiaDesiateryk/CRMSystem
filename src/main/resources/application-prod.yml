server:
  port: ${PORT:8080}

spring:
  jpa:
    hibernate:
      ddl-auto: validate
  flyway:
    baseline-on-migrate: true

jwt:
  keys:
    path: ${JWT_KEYS_PATH:/etc/secrets}
  issuer: ${JWT_ISSUER:https://api.example.com}
  audience: ${JWT_AUDIENCE:crm-frontend}

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS}
