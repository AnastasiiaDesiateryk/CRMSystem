server:
  port: ${PORT:8080}

spring:
  servlet:
    multipart:
      max-file-size: ${SPRING_SERVLET_MULTIPART_MAX_FILE_SIZE:20MB}
      max-request-size: ${SPRING_SERVLET_MULTIPART_MAX_REQUEST_SIZE:20MB}

  jpa:
    hibernate:
      ddl-auto: validate
  flyway:
    baseline-on-migrate: true

jwt:
  keys:
    path: ${JWT_KEYS_PATH:/etc/secrets}
  issuer: ${JWT_ISSUER:https://api.example.com}
  audience: ${JWT_AUDIENCE:crm-frontend}

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS}
